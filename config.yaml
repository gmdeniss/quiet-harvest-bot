assets:
  BTC:
    tsv: dataset/btc.tsv
    ticker: BTC-USD
    unit: 1e8        # satoshis → BTC
  ETH:
    tsv: dataset/eth.tsv
    ticker: ETH-USD
    unit: 1e18       # wei → ETH
  LTC:
    tsv: dataset/ltc.tsv
    ticker: LTC-USD
    unit: 1e8
  BCH:
    tsv: dataset/bch.tsv
    ticker: BCH-USD
    unit: 1e8
  DASH:
    tsv: dataset/dash.tsv
    ticker: DASH-USD
    unit: 1e8
  DOGE:
    tsv: dataset/dogecoin.tsv
    ticker: DOGE-USD
    unit: 1e8
  ZEC:
    tsv: dataset/zcash.tsv
    ticker: ZEC-USD
    unit: 1e8

# Параметры для grid search
grid:
  ma_period: [3, 5, 7, 10, 14]
  threshold: [0.05, 0.07, 0.10, 0.15, 0.20, 0.30, 0.50]
  trailing_stop_pct: [0.01, 0.015, 0.02, 0.03, 0.05]
  max_hold: [3, 7, 14, 30, 60]
  position_size: [0.10, 0.15, 0.20]
  direction: [long]

# Walk-forward параметры
walk_forward:
  train_months: 24
  test_months: 6

# Капитал для симуляции
initial_capital: 10000.0

# Минимум дней истории для активации сигнала
min_history_days: 30
